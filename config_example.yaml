base:
  bot_token: xxx:xxxx
  admins:
    - 0

telegraph:
  tokens:
    - xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  author_name: Test Name
  author_url: https://github.com/qini7-sese/eh2telegraph

proxy:
  endpoint: https://proxy.xxx.workers.dev/
  authorization: xxx

image_proxy:
  base_url: https://proxy.xxx.workers.dev/

http:
  ipv6_prefix:

exhentai:
  ipb_pass_hash: xxx
  ipb_member_id: xxx
  igneous: xxx

pixiv:
  # Optional. Log in to Pixiv in a browser and copy only the PHPSESSID
  # cookie value, without the leading "PHPSESSID=". Keep it secret.
  # Requests use this session directly first; the private proxy is fallback only.
  php_sessid: ""
  # Disable this when the bot host can reach Pixiv reliably and you do not want
  # authenticated Pixiv API requests to fall back to the proxy Worker.
  proxy_fallback: true

worker_kv:
  endpoint: https://kv.xxx.workers.dev
  mode: cloudflare # can be memory or auto
  token: xxx
  cache_size: 10240
  expire_sec: 5184000 # 60 days
